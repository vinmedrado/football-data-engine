name: Football Data Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

concurrency:
  group: football-data-engine
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run pipeline
        run: |
          python scripts/run_passados.py

      - name: Commit state and config
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state/ config/run_config.json
          git commit -m "chore: update pipeline state" || echo "No changes to commit"
          git push